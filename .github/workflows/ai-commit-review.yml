name: AI Commit Code Review

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit diff
        run: |
          git diff HEAD~1 HEAD > pr_diff.txt || git show HEAD > pr_diff.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install openai

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/ai-commit-review.js
